<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Planchas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 500px;
            margin: 0 auto;
        }

        /* ========== CABECERA ========== */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ========== BOTÓN VOLVER ========== */
        .btn-volver {
            background: #2c2c3e;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.2s;
        }

        .btn-volver:hover {
            background: #3c3c4e;
            transform: scale(1.02);
        }

        /* ========== BUSCADOR ========== */
        .buscador-container {
            margin-bottom: 15px;
        }

        .buscador-input {
            width: 100%;
            padding: 12px 16px;
            background: #2c2c3e;
            border: 1px solid #444;
            border-radius: 12px;
            color: #fff;
            font-size: 0.85rem;
            transition: 0.2s;
            outline: none;
        }

        .buscador-input::placeholder {
            color: #666;
        }

        .buscador-input:focus {
            border-color: #bb86fc;
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
        }

        /* ========== BOTONES DE ACCIÓN ========== */
        .acciones {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-accion {
            flex: 1;
            background: #2c2c3e;
            border: none;
            padding: 10px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            color: #fff;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-accion:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-importar {
            background: #03dac6;
            color: #000;
        }

        .btn-agregar {
            background: #25D366;
            color: #000;
        }

        /* ========== FORMULARIO NUEVO ITEM ========== */
        .form-nuevo-item {
            display: none;
            background: rgba(0,0,0,0.4);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .form-nuevo-item.visible {
            display: block;
        }

        .form-acciones-top {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .form-acciones-top .btn-accion-form {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .form-acciones-top .btn-accion-form:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .btn-guardar-item-top {
            background: #25D366;
            color: #000;
        }

        .btn-cancelar-item-top {
            background: transparent;
            border: 1px solid #555 !important;
            color: #888;
        }

        .btn-cancelar-item-top:hover {
            border-color: #ff4444 !important;
            color: #ff4444;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .form-grid .campo-full {
            grid-column: 1 / -1;
        }

        .form-grid .campo-precios {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 6px;
        }

        .campo-form {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .campo-form label {
            font-size: 0.6rem;
            color: #bb86fc;
        }

        /* Ocultar flechitas de inputs numéricos */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .campo-form input {
            width: 100%;
            padding: 6px 8px;
            background: #2c2c3e;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
            transition: 0.2s;
        }

        .campo-form input:focus {
            border-color: #25D366;
            box-shadow: 0 0 6px rgba(37, 211, 102, 0.3);
        }

        .campo-form input::placeholder {
            color: #555;
            font-size: 0.7rem;
        }

        /* Sugerencia flotante */
        .campo-apk-wrapper {
            position: relative;
        }

        .sugerencia-apk {
            display: none;
            position: absolute;
            top: -22px;
            left: 0;
            right: 0;
            background: #ff9800;
            color: #000;
            font-size: 0.6rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-align: center;
            white-space: nowrap;
            z-index: 10;
        }

        .sugerencia-apk.visible {
            display: block;
        }

        /* ========== CONTENEDOR DE DATOS ========== */
        .contenedor-datos {
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .contenedor-datos .placeholder {
            color: #666;
            font-size: 0.9rem;
            text-align: center;
            background: rgba(0,0,0,0.4);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px 20px;
            width: 100%;
        }

        .contenedor-datos .placeholder .icono {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            font-size: 0.6rem;
            color: #555;
            margin-top: 20px;
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 1100;
            display: none;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- CABECERA -->
        <div class="header">
            <h1>📋 PLANCHAS</h1>
        </div>

        <!-- BOTÓN VOLVER -->
        <a href="proyectos.html" class="btn-volver">⬅ Volver</a>

        <!-- BUSCADOR -->
        <div class="buscador-container">
            <input type="text" class="buscador-input" id="buscadorInput" placeholder="🔍 Buscar..." oninput="buscarDatos()">
        </div>

        <!-- BOTONES DE ACCIÓN -->
        <div class="acciones">
            <button class="btn-accion btn-importar" onclick="importarDatos()">📥 Importar</button>
            <button class="btn-accion btn-agregar" onclick="agregarNuevo()">➕ Agregar Nuevo</button>
        </div>

        <!-- FORMULARIO NUEVO ITEM -->
        <div class="form-nuevo-item" id="formNuevoItem">
            <div class="form-acciones-top">
                <button class="btn-accion-form btn-cancelar-item-top" onclick="cancelarNuevoItem()">✖ Cancelar</button>
                <button class="btn-accion-form btn-guardar-item-top" onclick="guardarNuevoItem()">💾 Guardar</button>
            </div>
            <div class="form-grid">
                <div class="campo-form" style="grid-column: 1 / -1;">
                    <label>Nombre del material</label>
                    <div style="display: flex; gap: 8px; align-items: end;">
                        <div style="flex: 1; position: relative;">
                            <input type="text" id="inputNombre" placeholder="Ej: Plancha 4mm, Plancha 6mm..." autocomplete="off" onfocus="this.select()" oninput="validarRepetidos()" style="width: 100%;">
                            <div id="avisoNombreRepetido" style="display:none; position: absolute; bottom: -16px; left: 0; font-size: 0.55rem; color: #ff9800; white-space: nowrap;"></div>
                        </div>
                        <div id="campoStockPlanchaFila" style="display: flex; flex-direction: column; gap: 2px; min-width: 80px;">
                            <label style="font-size: 0.6rem; color: #bb86fc;">Stock</label>
                            <input type="number" id="inputStockPlanchaFila" placeholder="0" autocomplete="off" oninput="sincronizarControlVentas()" onfocus="this.select()" style="width:100%; padding: 6px 8px; background: #2c2c3e; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 0.8rem; outline: none;">
                        </div>
                    </div>
                </div>
                <!-- FILA PARA ANCHO / ALTO / PIE² / COMPRA -->
                <div style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px;">
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <label style="font-size: 0.6rem; color: #bb86fc;">Ancho</label>
                        <input type="number" step="0.01" id="inputAncho" placeholder="0.00" autocomplete="off" oninput="calcularPlancha()" onfocus="this.select()" style="width:100%; padding: 6px 8px; background: #2c2c3e; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 0.8rem; outline: none;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <label style="font-size: 0.6rem; color: #bb86fc;">Alto</label>
                        <input type="number" step="0.01" id="inputAlto" placeholder="0.00" autocomplete="off" oninput="calcularPlancha()" onfocus="this.select()" style="width:100%; padding: 6px 8px; background: #2c2c3e; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 0.8rem; outline: none;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <label style="font-size: 0.6rem; color: #bb86fc;">Pie²</label>
                        <input type="text" id="inputPie2" placeholder="0.00" readonly style="width:100%; padding: 6px 8px; background: #1a1a2e; border: 1px solid #03dac6; border-radius: 6px; color: #03dac6; font-size: 0.8rem; font-weight: bold; outline: none; cursor: default;">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 2px;">
                        <label style="font-size: 0.6rem; color: #bb86fc;">Compra</label>
                        <input type="number" step="0.01" id="inputCompraPlancha" placeholder="0.00" autocomplete="off" onblur="formatearDecimal(this)" oninput="calcularPlancha()" onfocus="this.select()" style="width:100%; padding: 6px 8px; background: #2c2c3e; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 0.8rem; outline: none;">
                    </div>
                </div>
                <!-- FILA DE PRECIOS: Venta / Pie Compra / Pie Venta / APK -->
                <div class="campo-precios" style="grid-column: 1 / -1;">
                    <div class="campo-form">
                        <label>Venta</label>
                        <input type="number" step="0.01" id="inputVentaPlancha" placeholder="0.00" autocomplete="off" onblur="formatearDecimal(this)" onfocus="this.select()">
                    </div>
                    <div class="campo-form">
                        <label>Pie Compra</label>
                        <input type="text" id="inputPieCompra" placeholder="0.00" readonly style="background: #1a1a2e !important; color: #03dac6 !important; font-weight: bold; cursor: default;">
                    </div>
                    <div class="campo-form" style="position: relative;">
                        <label>Pie Venta</label>
                        <div class="sugerencia-apk" id="sugerenciaPieVenta"></div>
                        <input type="number" step="0.01" id="inputPieVenta" placeholder="0.00" autocomplete="off" onblur="formatearDecimal(this)" onfocus="this.select();mostrarSugerenciaPieVenta()" oninput="ocultarSugerenciaPieVenta()" style="width:100%; padding: 6px 8px; background: #2c2c3e; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 0.8rem; outline: none;">
                    </div>
                    <div class="campo-form campo-apk-wrapper">
                        <label>APK</label>
                        <div class="sugerencia-apk" id="sugerenciaApkPlancha"></div>
                        <input type="number" step="0.01" id="inputApkPlancha" placeholder="0.00" autocomplete="off" onblur="formatearDecimal(this)" onfocus="this.select();mostrarSugerenciaApkPlancha()" oninput="ocultarSugerenciaApkPlancha()" style="width:100%; padding: 6px 8px; background: #2c2c3e; border: 1px solid #444; border-radius: 6px; color: #fff; font-size: 0.8rem; outline: none;">
                    </div>
                </div>

                <!-- ========== SECCIÓN DE CONTROL DE VENTAS ========== -->
                <div class="control-ventas" id="controlVentas" style="margin-top: 10px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 10px; padding: 10px; grid-column: 1 / -1;">
                    <div style="font-size: 0.7rem; color: #03dac6; margin-bottom: 8px; font-weight: 600;">📊 CONTROL DE VENTAS</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;">
                        <div class="campo-form">
                            <label style="color: #03dac6;">Stock</label>
                            <input type="number" id="inputStockNuevo" placeholder="0" readonly style="background: #1a1a2e !important; color: #03dac6 !important; font-weight: bold; cursor: default;">
                        </div>
                        <div class="campo-form">
                            <label style="color: #ff9800;">Vendidos</label>
                            <input type="number" id="inputVendidos" placeholder="0" readonly style="background: #1a1a2e !important; color: #ff9800 !important; font-weight: bold; cursor: default;">
                        </div>
                        <div class="campo-form">
                            <label style="color: #25D366;">Vender</label>
                            <div style="display: flex; gap: 4px; align-items: center;">
                                <input type="number" id="inputVender" placeholder="0" min="0" onfocus="this.select()" style="color: #25D366 !important; font-weight: bold; flex: 1;">
                                <button onclick="confirmarVenta()" style="padding: 6px 10px; background: #25D366; border: none; border-radius: 6px; color: #000; font-size: 0.65rem; font-weight: 700; cursor: pointer; white-space: nowrap;">✓ Vender</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CONTENEDOR DE DATOS -->
        <div class="contenedor-datos" id="contenedorDatos">
            <div class="placeholder">
                <div class="icono">📋</div>
                <p>Agrega planchas para ver sus datos aquí</p>
            </div>
        </div>

        <div class="footer">
            Optimizador Pro v1.0 | Industrial Full
        </div>
    </div>

    <input type="file" id="importFile" style="display:none" accept=".json">

    <div id="toast" class="toast"></div>

    <script>
        // Almacenamiento local de items de planchas
        let datosGuardados = JSON.parse(localStorage.getItem('planchasItems') || '[]');
        let editandoIndex = -1;

        function guardarEnLocalStorage() {
            localStorage.setItem('planchasItems', JSON.stringify(datosGuardados));
        }

        function formatearDecimal(input) {
            if (input.value !== '') {
                const num = parseFloat(input.value);
                if (!isNaN(num)) {
                    input.value = num.toFixed(2);
                }
            }
        }

        function calcularPlancha() {
            const ancho = parseFloat(document.getElementById('inputAncho').value) || 0;
            const alto = parseFloat(document.getElementById('inputAlto').value) || 0;
            const compra = parseFloat(document.getElementById('inputCompraPlancha').value) || 0;

            // Pie² = (Ancho × Alto) / 900
            const pie2 = (ancho * alto) / 900;
            document.getElementById('inputPie2').value = pie2 > 0 ? pie2.toFixed(2) : '0.00';

            // Pie Compra = Precio Compra / Pie²
            if (pie2 > 0 && compra > 0) {
                const pieCompra = compra / pie2;
                document.getElementById('inputPieCompra').value = pieCompra.toFixed(2);

                // Pie Venta = Pie Compra + 0.70
                const pieVenta = pieCompra + 0.70;
                document.getElementById('inputPieVenta').value = pieVenta.toFixed(2);

                // APK = Pie Venta + 0.20
                const apk = pieVenta + 0.20;
                document.getElementById('inputApkPlancha').value = apk.toFixed(2);
            } else {
                document.getElementById('inputPieCompra').value = '0.00';
                document.getElementById('inputPieVenta').value = '0.00';
                document.getElementById('inputApkPlancha').value = '0.00';
            }
        }

        function mostrarSugerenciaPieVenta() {
            const pieCompra = parseFloat(document.getElementById('inputPieCompra').value) || 0;
            const pieVentaInput = document.getElementById('inputPieVenta');
            const pieVentaActual = parseFloat(pieVentaInput.value) || 0;
            const sugerencia = document.getElementById('sugerenciaPieVenta');
            
            if (pieCompra > 0) {
                const sugerido = pieCompra + 0.70;
                if (Math.abs(pieVentaActual - sugerido) > 0.01) {
                    sugerencia.textContent = `💡 Sugerido: ${sugerido.toFixed(2)} (Pie Compra + 0.70)`;
                    sugerencia.classList.add('visible');
                }
            }
        }

        function mostrarSugerenciaApkPlancha() {
            const pieVenta = parseFloat(document.getElementById('inputPieVenta').value) || 0;
            const apkInput = document.getElementById('inputApkPlancha');
            const apkActual = parseFloat(apkInput.value) || 0;
            const sugerencia = document.getElementById('sugerenciaApkPlancha');
            
            if (pieVenta > 0) {
                const sugerido = pieVenta + 0.20;
                if (Math.abs(apkActual - sugerido) > 0.01) {
                    sugerencia.textContent = `💡 Sugerido: ${sugerido.toFixed(2)} (Pie Venta + 0.20)`;
                    sugerencia.classList.add('visible');
                }
            }
        }

        function ocultarSugerenciaPieVenta() {
            document.getElementById('sugerenciaPieVenta').classList.remove('visible');
        }

        function ocultarSugerenciaApkPlancha() {
            document.getElementById('sugerenciaApkPlancha').classList.remove('visible');
        }

        function mostrarToast(mensaje) {
            const toast = document.getElementById('toast');
            toast.innerText = mensaje;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function validarRepetidos() {
            const nombre = document.getElementById('inputNombre').value.trim();
            const avisoNombre = document.getElementById('avisoNombreRepetido');

            if (nombre) {
                const nombreRepetido = datosGuardados.some(i => i.nombre === nombre);
                if (nombreRepetido) {
                    avisoNombre.textContent = `⚠️ ${nombre} (nombre repetido)`;
                    avisoNombre.style.display = 'block';
                } else {
                    avisoNombre.style.display = 'none';
                }
            } else {
                avisoNombre.style.display = 'none';
            }
        }

        function mostrarInfo() {
            const contenedor = document.getElementById('contenedorDatos');

            if (datosGuardados.length === 0) {
                contenedor.innerHTML = `
                    <div class="placeholder">
                        <div class="icono">📋</div>
                        <p style="color: #888; font-size: 0.8rem;">No hay planchas guardadas</p>
                    </div>
                `;
                return;
            }

            let itemsHtml = '';
            datosGuardados.forEach((item, index) => {
                itemsHtml += `
                    <div style="background: rgba(0,0,0,0.4); border: 1px solid #444; border-radius: 12px; padding: 10px; margin-bottom: 8px;">
                        <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 8px;">
                            <div style="flex: 1; min-width: 0;">
                                <div style="font-size: 0.6rem; color: #bb86fc; margin-bottom: 2px;">Nombre</div>
                                <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; color: #25D366; font-size: 0.85rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.nombre}</div>
                            </div>
                            <button onclick="editarItem(${index})" style="padding: 6px 16px; background: #bb86fc; border: none; border-radius: 6px; color: #000; font-size: 0.65rem; font-weight: 600; cursor: pointer; white-space: nowrap; margin-top: 14px;">✏️ Editar</button>
                            <button onclick="borrarItem(${index})" style="padding: 6px 16px; background: #ff4444; border: none; border-radius: 6px; color: #fff; font-size: 0.65rem; font-weight: 600; cursor: pointer; white-space: nowrap; margin-top: 14px;">🗑️ Borrar</button>
                        </div>
                        <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                            <div style="flex: 1;">
                                <div style="font-size: 0.6rem; color: #bb86fc; margin-bottom: 2px;">Código</div>
                                <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; color: #25D366; font-size: 0.8rem; font-weight: 500; text-align: center;">${item.codigo}</div>
                            </div>
                            <div style="flex: 1;">
                                <div style="font-size: 0.6rem; color: #bb86fc; margin-bottom: 2px;">Medida</div>
                                <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; color: #25D366; font-size: 0.8rem; font-weight: 500; text-align: center;">${item.medida}</div>
                            </div>
                            <div style="flex: 1;">
                                <div style="font-size: 0.6rem; color: #bb86fc; margin-bottom: 2px;">Stock</div>
                                <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; color: #25D366; font-size: 0.8rem; font-weight: 500; text-align: center;">${item.stock || 0}</div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 4px; margin-bottom: 4px;">
                            <div style="flex: 1;">
                                <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Ancho</div>
                                <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.ancho ? item.ancho.toFixed(2) : '0.00'}</div>
                            </div>
                            <div style="flex: 1;">
                                <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Alto</div>
                                <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.alto ? item.alto.toFixed(2) : '0.00'}</div>
                            </div>
                            <div style="flex: 1;">

            contenedor.innerHTML = `
                <div style="width: 100%;">

        }

                                </div>
                                <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.6rem; color: #bb86fc; margin-bottom: 2px;">Código</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; color: #25D366; font-size: 0.8rem; font-weight: 500; text-align: center;">${item.codigo}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.6rem; color: #bb86fc; margin-bottom: 2px;">Medida</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; color: #25D366; font-size: 0.8rem; font-weight: 500; text-align: center;">${item.medida}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.6rem; color: #bb86fc; margin-bottom: 2px;">Stock</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 6px 8px; color: #25D366; font-size: 0.8rem; font-weight: 500; text-align: center;">${item.stock || 0}</div>
                                    </div>
                                </div>
                                <div style="display: flex; gap: 4px; margin-bottom: 4px;">
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Ancho</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.ancho ? item.ancho.toFixed(2) : '0.00'}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Alto</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.alto ? item.alto.toFixed(2) : '0.00'}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Pie²</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.pie2 ? item.pie2.toFixed(2) : '0.00'}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Compra</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">S/ ${item.compra.toFixed(2)}</div>
                                    </div>
                                </div>
                                <div style="display: flex; gap: 4px;">
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Venta</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">S/ ${item.venta.toFixed(2)}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Pie Compra</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.pieCompra ? item.pieCompra.toFixed(2) : '0.00'}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Pie Venta</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.pieVenta ? item.pieVenta.toFixed(2) : '0.00'}</div>
                                    </div>
                                    <div style="flex: 1;">
                                        <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">APK</div>
                                        <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.apk.toFixed(2)}</div>

                                </div>
                            </div>
                        `;
                    });
                    contenedor.innerHTML = `
                        <div style="width: 100%;">
                            <p style="color: #03dac6; font-size: 0.85rem; margin-bottom: 8px; text-align: center;">🔍 Resultados: "${texto}"</p>

                        </div>
                    `;

            } else {
                mostrarInfo();
            }

        function importarDatos() {
            document.getElementById('importFile').click();
        }

        document.getElementById('importFile')?.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        datosGuardados = data;
                        guardarEnLocalStorage();
                        mostrarInfo();
                        mostrarToast('📥 Datos importados correctamente');
                    } else {
                        mostrarToast('❌ Archivo inválido');
                    }
                } catch (err) {
                    mostrarToast('❌ Archivo inválido');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        });

        function confirmarVenta() {
            const stockPrincipal = parseInt(document.getElementById('inputStockPlanchaFila').value) || 0;
            const vender = parseInt(document.getElementById('inputVender').value) || 0;
            const vendidosActuales = parseInt(document.getElementById('inputVendidos').value) || 0;
            const stockNuevoActual = parseInt(document.getElementById('inputStockNuevo').value) || 0;

            if (vender <= 0) {
                mostrarToast('❌ Ingresa una cantidad válida para vender');
                return;
            }

            if (vender > stockNuevoActual) {
                mostrarToast(`❌ No hay suficiente stock. Disponible: ${stockNuevoActual}`);
                return;
            }

            const nuevosVendidos = vendidosActuales + vender;
            const nuevoStock = stockNuevoActual - vender;

            document.getElementById('inputVendidos').value = nuevosVendidos;
            document.getElementById('inputStockNuevo').value = nuevoStock;
            document.getElementById('inputVender').value = '';

            mostrarToast(`✅ Venta registrada: ${vender} unidad(es)`);
        }

        function sincronizarControlVentas() {
            const stockPrincipal = parseInt(document.getElementById('inputStockPlanchaFila').value) || 0;
            document.getElementById('inputStockNuevo').value = stockPrincipal;
            document.getElementById('inputVendidos').value = 0;
            document.getElementById('inputVender').value = '';
        }

        function agregarNuevo() {
            const form = document.getElementById('formNuevoItem');
            if (form.classList.contains('visible')) {
                form.classList.remove('visible');
                return;
            }
            document.getElementById('inputNombre').value = '';
            document.getElementById('inputStockPlanchaFila').value = '';
            document.getElementById('inputAncho').value = '';
            document.getElementById('inputAlto').value = '';
            document.getElementById('inputCompraPlancha').value = '';
            document.getElementById('inputVentaPlancha').value = '';
            document.getElementById('inputPieVenta').value = '';
            document.getElementById('inputApkPlancha').value = '';
            document.getElementById('inputPie2').value = '0.00';
            document.getElementById('inputPieCompra').value = '0.00';
            document.getElementById('inputStockNuevo').value = 0;
            document.getElementById('inputVendidos').value = 0;
            document.getElementById('inputVender').value = 0;
            editandoIndex = -1;
            form.classList.add('visible');
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function cancelarNuevoItem() {
            document.getElementById('formNuevoItem').classList.remove('visible');
            mostrarToast('✖ Cancelado');
        }

        function editarItem(index) {
            if (index < 0 || index >= datosGuardados.length) {
                mostrarToast('❌ Item no encontrado');
                return;
            }
            const item = datosGuardados[index];
            editandoIndex = index;
            document.getElementById('inputNombre').value = item.nombre;
            document.getElementById('inputStockPlanchaFila').value = item.stock || '';
            document.getElementById('inputAncho').value = item.ancho > 0 ? item.ancho.toFixed(2) : '';
            document.getElementById('inputAlto').value = item.alto > 0 ? item.alto.toFixed(2) : '';
            document.getElementById('inputCompraPlancha').value = item.compra > 0 ? item.compra.toFixed(2) : '';
            document.getElementById('inputVentaPlancha').value = item.venta > 0 ? item.venta.toFixed(2) : '';
            document.getElementById('inputPie2').value = item.pie2 > 0 ? item.pie2.toFixed(2) : '0.00';
            document.getElementById('inputPieCompra').value = item.pieCompra > 0 ? item.pieCompra.toFixed(2) : '0.00';
            document.getElementById('inputPieVenta').value = item.pieVenta > 0 ? item.pieVenta.toFixed(2) : '0.00';
            document.getElementById('inputApkPlancha').value = item.apk > 0 ? item.apk.toFixed(2) : '';

            const vendidosGuardados = item.vendidos || 0;
            const stockPrincipal = item.stock || 0;
            document.getElementById('inputVendidos').value = vendidosGuardados;
            document.getElementById('inputVender').value = 0;
            document.getElementById('inputStockNuevo').value = Math.max(0, stockPrincipal - vendidosGuardados);

            const form = document.getElementById('formNuevoItem');
            form.classList.add('visible');
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            mostrarToast('✏️ Editando item');
        }

        function borrarItem(index) {
            if (index < 0 || index >= datosGuardados.length) {
                mostrarToast('❌ Item no encontrado');
                return;
            }
            const item = datosGuardados[index];
            if (!confirm(`¿Borrar "${item.nombre}"?`)) return;

            datosGuardados.splice(index, 1);
            guardarEnLocalStorage();
            mostrarToast(`🗑️ "${item.nombre}" borrado`);
            mostrarInfo();
        }

        function guardarNuevoItem() {
            const nombre = document.getElementById('inputNombre').value.trim();
            if (!nombre) {
                mostrarToast('❌ El nombre del material es obligatorio');
                document.getElementById('inputNombre').focus();
                return;
            }

            const stock = document.getElementById('inputStockPlanchaFila').value;
            const compra = document.getElementById('inputCompraPlancha').value;
            const venta = document.getElementById('inputVentaPlancha').value;
            const ancho = document.getElementById('inputAncho').value;
            const alto = document.getElementById('inputAlto').value;
            const pie2 = document.getElementById('inputPie2').value;
            const pieCompra = document.getElementById('inputPieCompra').value;
            const pieVenta = document.getElementById('inputPieVenta').value;
            const apk = document.getElementById('inputApkPlancha').value;
            const vendidos = parseInt(document.getElementById('inputVendidos').value) || 0;

            const item = {
                nombre: nombre,
                codigo: '—',
                medida: '—',
                stock: stock ? parseInt(stock) : 0,
                compra: compra ? parseFloat(compra) : 0,
                venta: venta ? parseFloat(venta) : 0,
                ventaMetro: 0,
                apk: apk ? parseFloat(apk) : 0,
                ancho: ancho ? parseFloat(ancho) : 0,
                alto: alto ? parseFloat(alto) : 0,
                pie2: pie2 ? parseFloat(pie2) : 0,
                pieCompra: pieCompra ? parseFloat(pieCompra) : 0,
                pieVenta: pieVenta ? parseFloat(pieVenta) : 0,
                vendidos: vendidos
            };

            if (editandoIndex >= 0 && editandoIndex < datosGuardados.length) {
                datosGuardados[editandoIndex] = item;
                mostrarToast(`✅ "${nombre}" actualizado`);
            } else {
                datosGuardados.push(item);
                mostrarToast(`✅ "${nombre}" guardado`);
            }

            guardarEnLocalStorage();
            editandoIndex = -1;
            document.getElementById('formNuevoItem').classList.remove('visible');
            mostrarInfo();
        }

        // Inicializar
        mostrarInfo();
    </script>
</body>
</html>
