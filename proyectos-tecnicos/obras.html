<script>
    let configuracionCompleta = null;
    let tipoPedidoActual = '';

    

    async function cambiarTipoPedido() {
        const selector = document.getElementById('pedido');
        tipoPedidoActual = selector.value;
        
        if (!tipoPedidoActual) {
            document.getElementById('contenedor-seccion').innerHTML = '';
            return;
        }
        
        const contenedor = document.getElementById('contenedor-seccion');
        
        let archivoHtml = '';
        let archivoJs = '';
        
        if (tipoPedidoActual === 'sistema') {
            archivoHtml = 'sistema.html';
            archivoJs = 'sistema.js';
        } else if (tipoPedidoActual === 'serie80') {
            archivoHtml = 'serie80.html';
            archivoJs = 'serie80.js';
        } else if (tipoPedidoActual === 'serie60') {
            archivoHtml = 'serie60.html';
            archivoJs = 'serie60.js';
        } else {
            archivoHtml = 'sistema.html';
            archivoJs = 'sistema.js';
        }
        
        try {
            const response = await fetch(archivoHtml);
            const html = await response.text();
            contenedor.innerHTML = html;
            
            const scriptAnterior = document.getElementById('script-seccion');
            if (scriptAnterior) scriptAnterior.remove();
            
            const script = document.createElement('script');
            script.id = 'script-seccion';
            script.src = archivoJs;
            document.body.appendChild(script);
            
            script.onload = function() {
                if (tipoPedidoActual === 'sistema' && typeof inicializarSistema === 'function') {
                    inicializarSistema(configuracionCompleta);
                } else if (tipoPedidoActual === 'serie80' && typeof inicializarSerie80 === 'function') {
                    inicializarSerie80(configuracionCompleta);
                } else if (tipoPedidoActual === 'serie60' && typeof inicializarSerie60 === 'function') {
                    inicializarSerie60(configuracionCompleta);
                }
            };
        } catch (error) {
            console.error('Error cargando sección:', error);
            contenedor.innerHTML = '<div class="alert alert-danger">Error cargando la sección. Verifica que los archivos existen.</div>';
        }
    }

    function reiniciarTodo() {
        if (confirm('¿Reiniciar todo?')) {
            location.reload();
        }
    }

function abrirPanelAdmin() {
    if (!configuracionCompleta) {
        alert('Espera a que cargue la configuración...');
        return;
    }
    
    // Guardar copia original para poder cancelar
    datosOriginales = JSON.parse(JSON.stringify(configuracionCompleta));
    
    // Mostrar modal
    document.getElementById('modalAdmin').style.display = 'block';
    document.getElementById('modalAdmin').classList.add('show');
    document.body.style.overflow = 'hidden';
    
    // Cargar primera pestaña
    cargarTabAdmin('perfiles');
}

function cerrarModalAdmin() {
    document.getElementById('modalAdmin').style.display = 'none';
    document.getElementById('modalAdmin').classList.remove('show');
    document.body.style.overflow = '';
}

function cambiarTabAdmin(tab) {
    tabActual = tab;
    cargarTabAdmin(tab);
    
    // Actualizar estilos de pestañas
    document.querySelectorAll('#adminTabs .nav-link').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
}

function cargarTabAdmin(tipo) {
    const contenedor = document.getElementById('contenidoAdmin');
    if (!contenedor) return;
    
    let html = '';
    
    if (tipo === 'perfiles') {
        html = generarTablaPerfiles();
    } else if (tipo === 'accesorios') {
        html = generarTablaAccesorios();
    } else if (tipo === 'tiras') {
        html = generarTablaTiras();
    } else if (tipo === 'vidrios') {
        html = generarTablaVidrios();
    }
    
    contenedor.innerHTML = html;
}

function generarTablaItems(estandar, pesados, sistema, tipo) {
    return `
        <table class="table table-sm table-dark">
            <thead><tr><th>Nombre</th><th>Estándar (S/.)</th><th>Pesado (S/.)</th></tr></thead>

                        <td><input type="text" class="form-control form-control-sm" value="${pesados[i]?.p || ''}" data-tipo="${tipo}" data-sistema="${sistema}" data-categoria="pesados" data-indice="${i}" style="width: 100px;"></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function guardarCambiosAdmin() {
    // Recorrer todos los inputs y actualizar configuracionCompleta
    document.querySelectorAll('#contenidoAdmin input').forEach(input => {
        const tipo = input.dataset.tipo;
        const sistema = input.dataset.sistema;
        const categoria = input.dataset.categoria;
        const indice = parseInt(input.dataset.indice);
        const nuevoValor = parseFloat(input.value);
        
        if (isNaN(nuevoValor)) return;
        
        if (tipo === 'vidrio') {
            configuracionCompleta[sistema].vidrios[indice].p = nuevoValor;
        } else if (tipo === 'perfil') {
            configuracionCompleta[sistema].perfiles[categoria][indice].p = nuevoValor;
        } else if (tipo === 'accesorio') {
            configuracionCompleta[sistema].accesorios[categoria][indice].p = nuevoValor;
        } else if (tipo === 'tira') {
            configuracionCompleta[sistema].tiras[categoria][indice].p = nuevoValor;
        }
    });
    
    // Guardar en localStorage o descargar JSON
    localStorage.setItem('materiales_personalizados', JSON.stringify(configuracionCompleta));
    
    alert('✅ Cambios guardados localmente. Recarga la página para aplicar los nuevos precios.');
    
    cerrarModalAdmin();
}

// Cargar configuración (ya no depende de materiales.json)
function cargarConfiguracion() {
    // Intentar cargar desde localStorage primero
    const personalizados = localStorage.getItem('materiales_personalizados');
    if (personalizados) {
        try {
            configuracionCompleta = JSON.parse(personalizados);
            console.log('Configuración cargada desde localStorage');
        } catch (e) {
            console.warn('Error parsing localStorage, usando base:', e);
            configuracionCompleta = JSON.parse(JSON.stringify(CONFIGURACION_BASE));
        }
    } else {
        // Usar configuración base hardcodeada
        configuracionCompleta = JSON.parse(JSON.stringify(CONFIGURACION_BASE));
        console.log('Configuración cargada desde base hardcodeada');
    }
    
    // ========== CARGAR VIDRIOS DESDE FIRESTORE ==========
    async function cargarVidriosDesdeFirestore() {
        try {
            const db = window.db;
            const auth = window.auth || window.firebaseAuth;
            if (!db || !auth) { cargarVidriosDesdeLocalStorage(); return; }
            
            const user = auth.currentUser;
            if (!user) { cargarVidriosDesdeLocalStorage(); return; }
            
            const usuarioUID = localStorage.getItem('tecniya_uid') || user.uid;
            // Usar sintaxis modular de Firebase v11
            const docSnap = await window.getDoc(window.doc(db, 'baseDatosV2', usuarioUID));
            if (docSnap.exists() && docSnap.data().items) {
                const items = docSnap.data().items;
                const clavesVidrio = ['planchas_general'];
                let vidriosBD = [];
                
                clavesVidrio.forEach(clave => {
                    if (items[clave] && Array.isArray(items[clave])) {
                        vidriosBD = vidriosBD.concat(items[clave]);
                    }
                });
                
                if (vidriosBD.length > 0) {
                    const vidriosConvertidos = vidriosBD.map(v => ({
                        n: v.nombre,
                        p: v.apk || v.venta || 0
                    }));
                    
                    if (configuracionCompleta.sistema) configuracionCompleta.sistema.vidrios = vidriosConvertidos;
                    if (configuracionCompleta.serie80) configuracionCompleta.serie80.vidrios = vidriosConvertidos;
                    if (configuracionCompleta.serie60) configuracionCompleta.serie60.vidrios = vidriosConvertidos;
                    console.log(`✅ Vidrios cargados desde Firestore (${vidriosConvertidos.length} items)`);
                    return;
                }
            }
            cargarVidriosDesdeLocalStorage();
        } catch (e) {
            console.warn('⚠️ Error Firestore, usando localStorage:', e.message);
            cargarVidriosDesdeLocalStorage();
        }
    }
    
    function cargarVidriosDesdeLocalStorage() {
        const baseDatosItems = localStorage.getItem('baseDatosItems');
        if (!baseDatosItems) return;
        try {
            const items = JSON.parse(baseDatosItems);
            const clavesVidrio = ['planchas_general'];
            let vidriosBD = [];
            clavesVidrio.forEach(clave => {
                if (items[clave] && Array.isArray(items[clave])) vidriosBD = vidriosBD.concat(items[clave]);
            });
            if (vidriosBD.length > 0) {
                const vidriosConvertidos = vidriosBD.map(v => ({ n: v.nombre, p: v.apk || v.venta || 0 }));
                if (configuracionCompleta.sistema) configuracionCompleta.sistema.vidrios = vidriosConvertidos;
                if (configuracionCompleta.serie80) configuracionCompleta.serie80.vidrios = vidriosConvertidos;
                if (configuracionCompleta.serie60) configuracionCompleta.serie60.vidrios = vidriosConvertidos;
                console.log(`✅ Vidrios cargados desde localStorage (${vidriosConvertidos.length} items)`);
            }
        } catch (e) { console.warn('⚠️ Error localStorage:', e.message); }
    }
    
    // Intentar Firestore primero - esperar a que el módulo cargue
    function esperarFirebaseYcargar() {
        if (window.db && window.auth) {
            window.auth.onAuthStateChanged(user => {
                if (user) cargarVidriosDesdeFirestore();
                else cargarVidriosDesdeLocalStorage();
            });
        } else {
            setTimeout(esperarFirebaseYcargar, 500);
        }
    }
    esperarFirebaseYcargar();
}

// ========== INICIALIZAR ==========
cargarConfiguracion();
