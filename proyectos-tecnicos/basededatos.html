<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Aluminios - Base de Datos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }

        /* HEADER */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #bb86fc, #03dac6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        .header p { color: #888; font-size: 0.8rem; margin-top: 5px; }

        /* SELECTOR DE COLOR (UNO PARA TODOS) */
        .color-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #2a2a3a;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 15px;
        }
        .color-selector label {
            font-size: 0.9rem;
            color: #ccc;
            white-space: nowrap;
            font-weight: 500;
        }
        .color-selector select {
            flex: 1;
            background: #1a1a2a;
            border: 1px solid #555;
            border-radius: 8px;
            color: #fff;
            padding: 8px 10px;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .color-selector select:focus {
            border-color: #bb86fc;
        }
        .color-selector select option {
            background: #1a1a2a;
            color: #fff;
        }

        /* BUSCADOR */
        .buscador-wrapper {
            display: flex;
            align-items: center;
            background: #2a2a3a;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 0 12px;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }
        .buscador-wrapper:focus-within {
            border-color: #bb86fc;
        }
        .buscador-icono {
            font-size: 1rem;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .buscador-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 0.9rem;
            padding: 10px 0;
            outline: none;
            min-width: 0;
        }
        .buscador-input::placeholder { color: #666; }
        .buscador-clear {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .buscador-clear:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        /* RESULTADOS */
        .resultados-info {
            text-align: center;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 10px;
            padding: 4px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        /* ITEM */
        .item {
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .item-nombre {
            flex: 1 1 100%;
            font-size: 0.85rem;
            color: #ddd;
            font-weight: 500;
        }
        .item-codigo {
            font-size: 0.75rem;
            color: #f1f508;
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .precios {
            display: flex;
            gap: 6px;
            flex: 1 1 100%;
            justify-content: flex-start;
        }
        .precio-grupo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex: 1;
        }
        .precio-label {
            font-size: 0.55rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .precio-input {
            width: 100%;
            padding: 4px 6px;
            background: #121212;
            border: 1px solid #555;
            border-radius: 6px;
            color: #00ff00;
            text-align: center;
            font-size: 0.8rem;
            outline: none;
        }
        .precio-input:focus {
            border-color: #bb86fc;
        }

        /* BOTONES */
        .btn-agregar {
            width: 100%;
            padding: 10px;
            background: #03dac6;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-agregar:hover { filter: brightness(1.1); }

        .btn-guardar {
            width: 100%;
            padding: 12px;
            background: #bb86fc;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }
        .btn-guardar:hover { filter: brightness(1.1); }

        .btn-volver {
            display: block;
            text-align: center;
            padding: 12px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-volver:hover { background: #444; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 1100;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .estado-conexion {
            text-align: center;
            font-size: 0.7rem;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .estado-conexion.online { color: #00ff88; background: rgba(0,255,136,0.1); }
        .estado-conexion.offline { color: #ff3b30; background: rgba(255,50,50,0.1); }
        .estado-conexion.loading { color: #ff9800; background: rgba(255,152,0,0.1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(187,134,252,0.5); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🪟 ALUMINIOS</h1>
            <p>Perfiles - Precios de compra, venta, x metro y APK</p>
        </div>

        <div id="estadoConexion" class="estado-conexion loading">⏳ Cargando...</div>

        <!-- SELECTOR DE COLOR (UNO PARA TODOS) -->
        <div class="color-selector">
            <label>🎨 Color:</label>
            <select id="colorSelector" onchange="cambiarColorGlobal(this.value)">
                <option value="natural">Natural</option>
                <option value="negro">Negro</option>
                <option value="blanco">Blanco</option>
                <option value="madera">Madera</option>
                <option value="negro_brillante">Negro Brillante</option>
                <option value="dune">Dune</option>
                <option value="otro">Otro</option>
            </select>
        </div>

        <!-- BUSCADOR -->
        <div class="buscador-wrapper">
            <span class="buscador-icono">🔍</span>
            <input type="text" class="buscador-input" id="buscadorInput" 
                placeholder="Buscar por nombre o código..." 
                oninput="aplicarFiltro()">
            <button class="buscador-clear" id="btnClear" style="display:none" onclick="limpiarBusqueda()">✕</button>
        </div>

        <!-- LISTA DE ITEMS -->
        <div id="listaItems">
            <div class="loading">⏳ Cargando datos...</div>
        </div>

        <a href="proyectos.html" class="btn-volver">← Volver a Proyectos</a>
    </div>

    <div id="toast" class="toast">✅ Guardado</div>

    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
    <script src="basededatos.js"></script>
</body>
</html>
