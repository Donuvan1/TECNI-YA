<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Base de Datos 2.0</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, onSnapshot, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB4W_0bdRoL-VnN6FAiSWhnQWNO-fRairc",
            authDomain: "proyecto-libertad-38c2a.firebaseapp.com",
            projectId: "proyecto-libertad-38c2a",
            storageBucket: "proyecto-libertad-38c2a.firebasestorage.app",
            messagingSenderId: "115380076439",
            appId: "1:115380076439:web:85383b2c32cdb40c798ed2"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // ========== FIRESTORE SYNC ==========
        const FIRESTORE_COLLECTION = 'baseDatosV2';
        let ultimaSyncFirestore = 0;
        let sincronizando = false;
        
        // Obtener UID del usuario desde localStorage (lo guarda index.html al iniciar sesión)
        const usuarioUID = localStorage.getItem('tecniya_uid') || 'compartido';
        
        // ========== CÓDIGO DE SERIE DIARIO ==========
        function generarCodigoDiario() {
            // Generar un código único basado en la fecha de hoy
            const hoy = new Date();
            const fechaStr = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
            
            // Usar el UID + fecha para generar un hash simple
            const base = usuarioUID + fechaStr;
            let hash = 0;
            for (let i = 0; i < base.length; i++) {
                const char = base.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convertir a 32-bit integer
            }
            // Tomar valor absoluto y convertir a alfanumérico de 8 caracteres
            const absHash = Math.abs(hash);
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let codigo = '';
            let temp = absHash;
            for (let i = 0; i < 8; i++) {
                codigo += chars[temp % chars.length];
                temp = Math.floor(temp / chars.length);
            }
            // Formatear como XXXX-XXXX
            return codigo.substring(0, 4) + '-' + codigo.substring(4, 8);
        }
        
        async function guardarEnFirestore() {
            if (sincronizando) return;
            sincronizando = true;
            try {
                const datos = JSON.parse(localStorage.getItem('baseDatosItems') || '{}');
                const codigoDiario = generarCodigoDiario();
                // Cada usuario guarda en su propio documento usando su UID
                await setDoc(doc(db, FIRESTORE_COLLECTION, usuarioUID), {
                    items: datos,
                    updatedAt: new Date().toISOString(),
                    usuarioUID: usuarioUID,
                    codigoDiario: codigoDiario,
                    fechaCodigo: new Date().toISOString().split('T')[0]
                });
                ultimaSyncFirestore = Date.now();
            } catch (e) {
                console.warn('⚠️ Error al guardar en Firestore (sin conexión?):', e.message);
            } finally {
                sincronizando = false;
            }
        }
        
        // ========== IMPORTAR DATOS DE OTRO USUARIO ==========
        async function importarDeOtroUsuario() {
            const codigoIngresado = document.getElementById('inputCodigoImportar').value.trim().toUpperCase();
            if (!codigoIngresado) {
                mostrarToast('❌ Ingresa un código de serie');
                return;
            }
            
            mostrarToast('🔍 Buscando usuario...');
            document.getElementById('modalImportar').style.display = 'none';
            
            try {
                // Buscar en Firestore un documento que tenga este código diario
                const q = query(collection(db, FIRESTORE_COLLECTION), where('codigoDiario', '==', codigoIngresado));
                const querySnapshot = await getDocs(q);
                
                let encontrado = false;
                querySnapshot.forEach((docSnap) => {
                    if (docSnap.id !== usuarioUID) { // No importar de uno mismo
                        const data = docSnap.data();
                        if (data.items && Object.keys(data.items).length > 0) {
                            // Fusionar los datos importados con los actuales
                            const misDatos = JSON.parse(localStorage.getItem('baseDatosItems') || '{}');
                            const datosImportados = data.items;
                            
                            let itemsImportados = 0;
                            // Recorrer cada categoría+color del otro usuario
                            Object.keys(datosImportados).forEach(key => {
                                if (!misDatos[key]) {
                                    misDatos[key] = [];
                                }
                                datosImportados[key].forEach(itemImportado => {
                                    // Verificar si ya existe (por nombre+código)
                                    const existe = misDatos[key].some(i => 
                                        i.nombre === itemImportado.nombre && i.codigo === itemImportado.codigo
                                    );
                                    if (!existe) {
                                        misDatos[key].push(itemImportado);
                                        itemsImportados++;
                                    }
                                });
                            });
                            
                            if (itemsImportados > 0) {
                                localStorage.setItem('baseDatosItems', JSON.stringify(misDatos));
                                datosGuardados = misDatos;
                                guardarEnFirestore();
                                mostrarToast(`✅ ${itemsImportados} item(s) importados`);
                                // Recargar vista
                                const categoria = document.getElementById('categoriaSelect').value;
                                const color = document.getElementById('colorSelect').value;
                                if (categoria) mostrarInfoCategoria(categoria, color || null);
                            } else {
                                mostrarToast('ℹ️ No hay items nuevos para importar');
                            }
                            encontrado = true;
                        }
                    }
                });
                
                if (!encontrado) {
                    mostrarToast('❌ No se encontró ningún usuario con ese código');
                }
            } catch (e) {
                console.error('Error al importar:', e);
                mostrarToast('❌ Error al buscar: ' + e.message);
            }
        }
        
        function mostrarModalImportar() {
            document.getElementById('modalImportar').style.display = 'flex';
            document.getElementById('inputCodigoImportar').value = '';
            document.getElementById('inputCodigoImportar').focus();
        }
        
        function cerrarModalImportar() {
            document.getElementById('modalImportar').style.display = 'none';
        }
        
        async function cargarDeFirestore() {
            try {
                // Cada usuario carga desde su propio documento usando su UID
                const docSnap = await getDoc(doc(db, FIRESTORE_COLLECTION, usuarioUID));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.items && Object.keys(data.items).length > 0) {
                        localStorage.setItem('baseDatosItems', JSON.stringify(data.items));
                        console.log('✅ Datos cargados desde Firestore para usuario:', usuarioUID);
                        return true;
                    }
                }
            } catch (e) {
                console.warn('⚠️ Error al cargar de Firestore (sin conexión?):', e.message);
            }
            return false;
        }
        
        // Sobrescribir guardarEnLocalStorage para que también guarde en Firestore
        const originalGuardarEnLocalStorage = window.guardarEnLocalStorage;
        window.guardarEnLocalStorage = function() {
            if (originalGuardarEnLocalStorage) originalGuardarEnLocalStorage();
            guardarEnFirestore();
        };
        
        // ========== DATOS INICIALES POR DEFECTO ==========

            // Perfiles (varillas) - datos desde sistema.js
            const perfilesEst = [

                {n: "m doble corrediza", c: "3188", p: 4.45},
                {n: "puente standar", c: "5283", p: 8.26},
                {n: "puente doble corr", c: "5284", p: 10.14},
                {n: "riel inferior", c: "8413", p: 1.86},
                {n: "riel doble", c: "8444", p: 3.51},
                {n: "u-12", c: "u-12", p: 2.30},
                {n: "perfil H", c: "8220", p: 5.55},
                {n: "portafelpa", c: "8116", p: 0.81},
                {n: "angulo", c: "4104", p: 0.83},

            const perfilesPes = [

                {n: "u-alta", c: "7955", p: 3.00},

            const coloresVarillas = [
                { value: 'natural', label: 'Natural (Gris)' },

            // Perfiles estándar en varillas
            perfilesEst.forEach(perfil => {

                    const key = `varillas_${color.value}`;

            ];
            tirasData.forEach(tira => {
                coloresTiras.forEach(color => {
                    const key = `tiras_${color.value}`;
                    if (!datos[key]) datos[key] = [];
                    datos[key].push({
                        nombre: tira.n, codigo: tira.c, medida: '—',
                        stock: 0, compra: 0, venta: tira.p, ventaMetro: 0, apk: 0,
                        vendidos: 0, categoria: 'tiras', colorTexto: color.label, color: color.value
                    });
                });
            });
            
            // Vidrios (en Otros)
            const vidriosData = [
                { n: "Incoloro 2 mm", p: 1.50 },

                { n: "Reflejante 6 mm", p: 8.50 },
                { n: "Catedral 4 mm", p: 5.00 }
            ];
            vidriosData.forEach(v => {
                const key = 'otros_general';
                if (!datos[key]) datos[key] = [];
                datos[key].push({
                    nombre: v.n, codigo: '—', medida: '—',
                    stock: 0, compra: 0, venta: v.p, ventaMetro: 0, apk: 0,

            return datos;
        }
        
        // Al iniciar, SIEMPRE cargar desde Firestore (base de datos 2.0)
        // y sobrescribir cualquier dato local anterior
        window.addEventListener('DOMContentLoaded', async function() {
            const cargo = await cargarDeFirestore();
            if (cargo) {
                console.log('✅ Datos cargados desde Firestore (baseDatosV2)');
                // Actualizar la variable global con los datos de Firestore
                datosGuardados = JSON.parse(localStorage.getItem('baseDatosItems') || '{}');
                if (typeof window.mostrarInfoCategoria === 'function') {
                    const cat = document.getElementById('categoriaSelect')?.value;
                    const col = document.getElementById('colorSelect')?.value;
                    if (cat && col) window.mostrarInfoCategoria(cat, col);
                }
            } else {
                // No hay datos en Firestore: verificar si hay datos locales
                const datosLocales = localStorage.getItem('baseDatosItems');
                if (!datosLocales || datosLocales === '{}') {
                    // No hay datos en ningún lado: generar datos iniciales
                    console.log('🔄 Generando datos iniciales por defecto...');
                    datosGuardados = generarDatosIniciales();
                    guardarEnLocalStorage();
                    guardarEnFirestore();
                    console.log('✅ Datos iniciales generados y guardados');
                } else {
                    console.log('📦 Usando datos locales existentes');
                }
            }
            // Sincronizar cada 30 segundos
            setInterval(guardarEnFirestore, 30000);
        });
        
        window.db = db;
        window.guardarEnFirestore = guardarEnFirestore;
        window.cargarDeFirestore = cargarDeFirestore;
        window.mostrarModalImportar = mostrarModalImportar;
        window.cerrarModalImportar = cerrarModalImportar;
        window.importarDeOtroUsuario = importarDeOtroUsuario;
    </script>

            <input type="text" id="inputCodigoImportar" placeholder="Ej: ABCD-1234" autocomplete="off" style="width:100%; padding: 12px 16px; background: #2c2c3e; border: 1px solid #444; border-radius: 12px; color: #fff; font-size: 1rem; font-weight: bold; text-align: center; text-transform: uppercase; outline: none; letter-spacing: 3px;" onkeydown="if(event.key==='Enter') importarDeOtroUsuario()">

    <script>
        let ultimoItemGuardado = null;
        let editandoIndex = -1; // -1 = nuevo, >=0 = editando item en esa posición
        let backupDatosGuardados = null; // Copia de seguridad para cancelar
        // Almacenamiento local de items por categoría+color
        let datosGuardados = JSON.parse(localStorage.getItem('baseDatosItems') || '{}');

        function guardarEnLocalStorage() {
            localStorage.setItem('baseDatosItems', JSON.stringify(datosGuardados));
        }

        function obtenerKey(categoria, color) {
            return `${categoria}_${color || 'sin-color'}`;
        }

        // Colores disponibles por categoría
        const coloresPorCategoria = {
            planchas: [
                { value: 'general', label: 'General', hex: '#888888' }
            ],
            varillas: [
                { value: 'natural', label: 'Natural (Gris)', hex: '#b0b0b0' },
                { value: 'negro', label: 'Negro', hex: '#1a1a1a' },
                { value: 'negro-brillante', label: 'Negro Brillante', hex: '#0d0d0d' },
                { value: 'blanco', label: 'Blanco', hex: '#f0f0f0' },
                { value: 'madera', label: 'Madera', hex: '#8B5E3C' },
                { value: 'duna', label: 'Duna', hex: '#C4A882' }
            ],
            tiras: [
                { value: 'gris', label: 'Gris', hex: '#808080' },
                { value: 'negro', label: 'Negro', hex: '#1a1a1a' },
                { value: 'blanco', label: 'Blanco', hex: '#f0f0f0' }
            ],
            accesorios: [
                { value: 'gris', label: 'Gris', hex: '#808080' },
                { value: 'negro', label: 'Negro', hex: '#1a1a1a' },
                { value: 'blanco', label: 'Blanco', hex: '#f0f0f0' },
                { value: 'madera', label: 'Madera', hex: '#8B5E3C' }
            ],
            otros: [
                { value: 'general', label: 'General', hex: '#888888' }
            ]
        };

        const nombres = {
            planchas: 'Planchas',
            varillas: 'Varillas',
            accesorios: 'Accesorios',
            tiras: 'Tiras',
            otros: 'Otros'
        };

        const iconos = {
            planchas: '📋',
            varillas: '🔩',
            accesorios: '🔧',
            tiras: '📏',
            otros: '📦'
        };

        function formatearDecimal(input) {
            if (input.value !== '') {
                const num = parseFloat(input.value);
                if (!isNaN(num)) {
                    input.value = num.toFixed(2);
                }
            }
        }

        function calcularApkAuto() {
            const ventaMetro = parseFloat(document.getElementById('inputVentaMetro').value) || 0;
            const apkInput = document.getElementById('inputApk');
            if (ventaMetro > 0) {
                const apkCalculado = ventaMetro + 0.20;
                apkInput.value = apkCalculado.toFixed(2);
            }
            ocultarSugerenciaApk();
        }

        function mostrarSugerenciaApk() {
            const ventaMetro = parseFloat(document.getElementById('inputVentaMetro').value) || 0;
            const apkInput = document.getElementById('inputApk');
            const apkActual = parseFloat(apkInput.value) || 0;
            const sugerencia = document.getElementById('sugerenciaApk');
            
            if (ventaMetro > 0) {
                const apkCalculado = ventaMetro + 0.20;
                // Solo mostrar sugerencia si el valor actual es diferente al calculado
                if (Math.abs(apkActual - apkCalculado) > 0.01) {
                    sugerencia.textContent = `💡 Sugerido: ${apkCalculado.toFixed(2)} (Vta x m + 0.20)`;
                    sugerencia.classList.add('visible');
                }
            }
        }

        function ocultarSugerenciaApk() {
            document.getElementById('sugerenciaApk').classList.remove('visible');
        }

        // ========== FUNCIONES DE PLANCHAS ==========

        function calcularPlancha() {
            const ancho = parseFloat(document.getElementById('inputAncho').value) || 0;
            const alto = parseFloat(document.getElementById('inputAlto').value) || 0;
            const compra = parseFloat(document.getElementById('inputCompraPlancha').value) || 0;

            // Pie² = (Ancho × Alto) / 900
            const pie2 = (ancho * alto) / 900;
            document.getElementById('inputPie2').value = pie2 > 0 ? pie2.toFixed(2) : '0.00';

            // Pie Compra = Precio Compra / Pie²
            if (pie2 > 0 && compra > 0) {
                const pieCompra = compra / pie2;
                document.getElementById('inputPieCompra').value = pieCompra.toFixed(2);

                // Pie Venta = Pie Compra + 0.70
                const pieVenta = pieCompra + 0.70;
                document.getElementById('inputPieVenta').value = pieVenta.toFixed(2);

                // APK = Pie Venta + 0.20
                const apk = pieVenta + 0.20;
                document.getElementById('inputApkPlancha').value = apk.toFixed(2);
            } else {
                document.getElementById('inputPieCompra').value = '0.00';
                document.getElementById('inputPieVenta').value = '0.00';
                document.getElementById('inputApkPlancha').value = '0.00';
            }
        }

        function mostrarSugerenciaPieVenta() {
            const pieCompra = parseFloat(document.getElementById('inputPieCompra').value) || 0;
            const pieVentaInput = document.getElementById('inputPieVenta');
            const pieVentaActual = parseFloat(pieVentaInput.value) || 0;
            const sugerencia = document.getElementById('sugerenciaPieVenta');
            
            if (pieCompra > 0) {
                const sugerido = pieCompra + 0.70;
                if (Math.abs(pieVentaActual - sugerido) > 0.01) {
                    sugerencia.textContent = `💡 Sugerido: ${sugerido.toFixed(2)} (Pie Compra + 0.70)`;
                    sugerencia.classList.add('visible');
                }
            }
        }

        function mostrarSugerenciaApkPlancha() {
            const pieVenta = parseFloat(document.getElementById('inputPieVenta').value) || 0;
            const apkInput = document.getElementById('inputApkPlancha');
            const apkActual = parseFloat(apkInput.value) || 0;
            const sugerencia = document.getElementById('sugerenciaApkPlancha');
            
            if (pieVenta > 0) {
                const sugerido = pieVenta + 0.20;
                if (Math.abs(apkActual - sugerido) > 0.01) {
                    sugerencia.textContent = `💡 Sugerido: ${sugerido.toFixed(2)} (Pie Venta + 0.20)`;
                    sugerencia.classList.add('visible');
                }

        function cambiarCategoria() {
            const categoria = document.getElementById('categoriaSelect').value;

            const colorContainer = document.getElementById('colorContainer');
            const colorSelect = document.getElementById('colorSelect');
            const contenedor = document.getElementById('contenedorDatos');
            const accionesContainer = document.getElementById('accionesContainer');
            const coloresContainer = document.getElementById('coloresContainer');
            const coloresGrid = document.getElementById('coloresGrid');
            const formNuevoItem = document.getElementById('formNuevoItem');

            // Resetear color select y ocultar formulario
            colorSelect.value = '';
            colorContainer.classList.remove('visible');
            coloresContainer.classList.remove('visible');
            formNuevoItem.classList.remove('visible');

            if (!categoria) {
                contenedor.innerHTML = `
                    <div class="placeholder">
                        <div class="icono">🗄️</div>
                        <p>Selecciona una categoría para ver sus datos</p>
                    </div>
                `;
                accionesContainer.style.display = 'none';
                return;
            }

            // Mostrar botones al seleccionar categoría
            accionesContainer.style.display = 'flex';

            // Ajustar campos del formulario según la categoría
            ajustarCamposPorCategoria(categoria);

            // Mostrar selector de color si la categoría tiene colores definidos

            if (coloresPorCategoria[categoria]) {
                colorSelect.innerHTML = '<option value="">-- Seleccionar --</option>';
                coloresPorCategoria[categoria].forEach(color => {
                    const option = document.createElement('option');
                    option.value = color.value;
                    option.textContent = color.label;
                    colorSelect.appendChild(option);
                });
                colorContainer.classList.add('visible');

                // Mostrar círculos de colores
                coloresGrid.innerHTML = '';
                coloresPorCategoria[categoria].forEach(color => {
                    const item = document.createElement('div');
                    item.className = 'color-item';
                    item.dataset.value = color.value;
                    item.onclick = function() { seleccionarColorCirculo(categoria, color.value); };
                    item.innerHTML = `
                        <div class="circulo" style="background: ${color.hex};"></div>
                        <div class="color-nombre">${color.label}</div>
                    `;
                    coloresGrid.appendChild(item);
                });
                coloresContainer.classList.add('visible');

                // Para categorías con un solo color, seleccionarlo automáticamente
                if (coloresPorCategoria[categoria].length === 1) {
                    colorSelect.value = coloresPorCategoria[categoria][0].value;
                    mostrarInfoCategoria(categoria, colorSelect.value);
                } else {
                    mostrarInfoCategoria(categoria, null);
                }
            } else {
                mostrarInfoCategoria(categoria, null);
            }
        }

        // Colores seleccionados adicionales (además del principal del select)
        let coloresAdicionales = [];

        function seleccionarColorCirculo(categoria, value) {
            // Solo permitir si el formulario está visible (agregando o editando)
            const form = document.getElementById('formNuevoItem');
            if (!form.classList.contains('visible')) {
                return;
            }
            
            const colorPrincipal = document.getElementById('colorSelect').value;
            
            if (value === colorPrincipal) {
                // El color principal no se puede desmarcar
                return;
            }
            
            // Toggle del color adicional
            const idx = coloresAdicionales.indexOf(value);
            if (idx === -1) {
                coloresAdicionales.push(value);
            } else {
                coloresAdicionales.splice(idx, 1);
            }
            
            actualizarCirculosSeleccionados();
        }

            const colorPrincipal = document.getElementById('colorSelect').value;

                    el.classList.add('seleccionado');
                } else if (coloresAdicionales.includes(val)) {
                    el.classList.add('seleccionado');
                } else {
                    el.classList.remove('seleccionado');
                }
            });
        }

        function guardarSilencioso() {
            const nombre = document.getElementById('inputNombre').value.trim();
            const codigo = document.getElementById('inputCodigo').value.trim();
            if (!nombre && !codigo) return;

            const medida = document.getElementById('inputMedida').value.trim();

            const categoria = document.getElementById('categoriaSelect').value;
            const colorPrincipal = document.getElementById('colorSelect').value;
            const colorTexto = colorPrincipal ? document.getElementById('colorSelect').options[document.getElementById('colorSelect').selectedIndex].text : '';

            const vendidos = parseInt(document.getElementById('inputVendidos').value) || 0;

            let itemCompleto;
            if (categoria === 'planchas') {
                const stock = document.getElementById('inputStockPlanchaFila').value;
                const compra = document.getElementById('inputCompraPlancha').value;
                const venta = document.getElementById('inputVentaPlancha').value;
                const ancho = document.getElementById('inputAncho').value;
                const alto = document.getElementById('inputAlto').value;
                const pie2 = document.getElementById('inputPie2').value;
                const pieCompra = document.getElementById('inputPieCompra').value;
                const pieVenta = document.getElementById('inputPieVenta').value;
                const apk = document.getElementById('inputApkPlancha').value;

                itemCompleto = {
                    nombre, codigo: codigo || '—', medida: '—',
                    stock: stock ? parseInt(stock) : 0,
                    compra: compra ? parseFloat(compra) : 0,
                    venta: venta ? parseFloat(venta) : 0,
                    ventaMetro: 0,
                    apk: apk ? parseFloat(apk) : 0,
                    ancho: ancho ? parseFloat(ancho) : 0,
                    alto: alto ? parseFloat(alto) : 0,
                    pie2: pie2 ? parseFloat(pie2) : 0,
                    pieCompra: pieCompra ? parseFloat(pieCompra) : 0,
                    pieVenta: pieVenta ? parseFloat(pieVenta) : 0,
                    vendidos, categoria, colorTexto
                };
            } else {
                const compra = document.getElementById('inputCompra').value;
                const venta = document.getElementById('inputVenta').value;
                const ventaMetro = document.getElementById('inputVentaMetro').value;
                const apk = document.getElementById('inputApk').value;
                const stock = document.getElementById('inputStock').value;

                itemCompleto = {
                    nombre, codigo: codigo || '—', medida: medida || '—',
                    stock: stock ? parseInt(stock) : 0,
                    compra: compra ? parseFloat(compra) : 0,
                    venta: venta ? parseFloat(venta) : 0,
                    ventaMetro: ventaMetro ? parseFloat(ventaMetro) : 0,
                    apk: apk ? parseFloat(apk) : 0,
                    vendidos, categoria, colorTexto
                };
            }

            const itemBase = {
                nombre, codigo: codigo || '—', medida: '—',
                stock: 0, compra: 0, venta: 0, ventaMetro: 0, apk: 0,
                vendidos: 0, categoria, colorTexto
            };

            const coloresCompletos = [colorPrincipal];
            coloresAdicionales.forEach(c => { if (!coloresCompletos.includes(c)) coloresCompletos.push(c); });

            const todosLosColores = coloresPorCategoria[categoria] || [];
            const coloresDeCategoria = todosLosColores.map(c => c.value);

            coloresDeCategoria.forEach(color => {
                const key = obtenerKey(categoria, color);
                if (!datosGuardados[key]) datosGuardados[key] = [];
                const esCompleto = coloresCompletos.includes(color);
                const item = esCompleto ? { ...itemCompleto, color } : { ...itemBase, color };

                // Buscar si el item ya existe en este color por nombre+código
                const idxEnColor = datosGuardados[key].findIndex(i => i.nombre === itemCompleto.nombre && i.codigo === itemCompleto.codigo);
                if (idxEnColor >= 0) {
                    // Ya existe: actualizar según corresponda
                    if (esCompleto) {
                        datosGuardados[key][idxEnColor] = item;
                    } else {
                        datosGuardados[key][idxEnColor].nombre = item.nombre;
                        datosGuardados[key][idxEnColor].codigo = item.codigo;
                    }
                } else {
                    // No existe: crear nuevo
                    datosGuardados[key].push(item);
                }
            });
            guardarEnLocalStorage();
            ultimoItemGuardado = itemCompleto;
            editandoIndex = -1;
        }

        function navegarColorForm(direccion) {
            const categoria = document.getElementById('categoriaSelect').value;
            const colores = coloresPorCategoria[categoria];
            if (!colores) return;

            const colorActual = document.getElementById('colorSelect').value;
            if (!colorActual) return;

            // Guardar silenciosamente los datos del color actual antes de navegar
            guardarSilencioso();

            const idxActual = colores.findIndex(c => c.value === colorActual);
            let nuevoIdx;
            if (direccion === 'siguiente') {
                nuevoIdx = (idxActual + 1) % colores.length;
            } else {
                nuevoIdx = (idxActual - 1 + colores.length) % colores.length;
            }

            const nuevoColor = colores[nuevoIdx].value;
            document.getElementById('colorSelect').value = nuevoColor;
            coloresAdicionales = [];
            actualizarCirculosSeleccionados();
            actualizarDisplayColorForm();

            // Buscar si el item existe en el nuevo color para cargar sus datos
            const key = obtenerKey(categoria, nuevoColor);
            const items = datosGuardados[key] || [];
            const nombreActual = document.getElementById('inputNombre').value.trim();
            const itemEncontrado = items.find(i => i.nombre === nombreActual && i.codigo === (document.getElementById('inputCodigo').value.trim() || '—'));

            if (itemEncontrado) {
                // Cargar datos guardados de este color
                cargarItemEnFormulario(itemEncontrado);

                // Limpiar formulario para el nuevo color
                document.getElementById('inputNombre').value = '';
                document.getElementById('inputCodigo').value = '';

                document.getElementById('inputVenta').value = '';
                document.getElementById('inputVentaMetro').value = '';
                document.getElementById('inputApk').value = '';
                document.getElementById('inputStockNuevo').value = 0;
                document.getElementById('inputVendidos').value = 0;

        function buscarDatosGlobal() {
            const texto = document.getElementById('buscadorInput').value.trim().toLowerCase();
            const contenedor = document.getElementById('contenedorDatos');

            if (texto.length === 0) {
                // Si no hay texto, mostrar la info normal según categoría seleccionada
                const categoria = document.getElementById('categoriaSelect').value;
                if (categoria) {
                    const color = document.getElementById('colorSelect').value;
                    mostrarInfoCategoria(categoria, color || null);

                    contenedor.innerHTML = `

                            <div class="icono">🗄️</div>
                            <p>Selecciona una categoría para ver sus datos</p>
                        </div>
                    `;
                }
                return;
            }

            // Buscar en TODAS las categorías y TODOS los colores
            let resultados = [];
            Object.keys(coloresPorCategoria).forEach(categoria => {
                const colores = coloresPorCategoria[categoria] || [];
                colores.forEach(color => {
                    const key = obtenerKey(categoria, color.value);
                    const items = datosGuardados[key] || [];
                    items.forEach(item => {
                        const nombreMatch = item.nombre.toLowerCase().includes(texto);
                        const codigoMatch = item.codigo.toLowerCase().includes(texto);
                        if (nombreMatch || codigoMatch) {
                            resultados.push({
                                ...item,
                                categoria: categoria,
                                categoriaLabel: nombres[categoria] || categoria,
                                categoriaIcono: iconos[categoria] || '📦',
                                color: color.value,
                                colorLabel: color.label,
                                colorHex: color.hex

            if (resultados.length === 0) {
                contenedor.innerHTML = `

        // ========== SELECCIONAR RESULTADO DE BÚSQUEDA ==========

        function seleccionarResultadoBusqueda(categoria, color, nombreItem, codigoItem) {
            const categoriaSelect = document.getElementById('categoriaSelect');
            const colorSelect = document.getElementById('colorSelect');
            
            // Cambiar categoría si es diferente
            if (categoriaSelect.value !== categoria) {
                categoriaSelect.value = categoria;
                const event = new Event('change');
                categoriaSelect.dispatchEvent(event);
            }
            
            // Seleccionar el color después de que cambiarCategoria() se ejecute
            setTimeout(() => {
                colorSelect.value = color;
                coloresAdicionales = [];
                actualizarCirculosSeleccionados();
                
                // Mostrar solo el item filtrado
                const key = obtenerKey(categoria, color);
                const items = datosGuardados[key] || [];
                const itemEncontrado = items.find(i => i.nombre === nombreItem && i.codigo === codigoItem);
                
                if (itemEncontrado) {
                    mostrarItemFiltrado(categoria, color, itemEncontrado);
                } else {
                    mostrarInfoCategoria(categoria, color);
                }
                
                // Limpiar el buscador
                document.getElementById('buscadorInput').value = '';
            }, 50);
        }

                    <div style="display: flex; gap: 4px;">
                        <div style="flex: 1;">
                            <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Compra</div>
                            <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">S/ ${item.compra.toFixed(2)}</div>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Venta</div>
                            <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #ffffff; font-size: 0.75rem; font-weight: 600; text-align: center;">S/ ${item.venta.toFixed(2)}</div>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">Vta x m</div>
                            <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #448AFF; font-size: 0.75rem; font-weight: 600; text-align: center;">S/ ${item.ventaMetro.toFixed(2)}</div>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.55rem; color: #bb86fc; margin-bottom: 2px;">APK</div>
                            <div style="background: #2c2c3e; border: 1px solid #444; border-radius: 6px; padding: 5px 6px; color: #25D366; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.apk.toFixed(2)}</div>
                        </div>
                    </div>`;
            }
            
            itemHtml += `
                    ${item.vendidos ? `
                    <div style="display: flex; gap: 4px; margin-top: 6px; padding-top: 6px; border-top: 1px solid #333;">
                        <div style="flex: 1;">
                            <div style="font-size: 0.55rem; color: #03dac6; margin-bottom: 2px;">Stock Disp.</div>
                            <div style="background: #1a1a2e; border: 1px solid #03dac6; border-radius: 6px; padding: 5px 6px; color: #03dac6; font-size: 0.75rem; font-weight: 600; text-align: center;">${Math.max(0, (item.stock || 0) - item.vendidos)}</div>
                        </div>
                        <div style="flex: 1;">
                            <div style="font-size: 0.55rem; color: #ff9800; margin-bottom: 2px;">Vendidos</div>
                            <div style="background: #1a1a2e; border: 1px solid #ff9800; border-radius: 6px; padding: 5px 6px; color: #ff9800; font-size: 0.75rem; font-weight: 600; text-align: center;">${item.vendidos}</div>
                        </div>
                    </div>
                    ` : ''}
                </div>`;
            
            contenedor.innerHTML = `
                <div style="width: 100%;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                        <p style="color: #03dac6; font-size: 0.85rem; margin: 0;">🔍 Item encontrado</p>
                        <button onclick="mostrarInfoCategoria('${categoria}', '${color}')" style="padding: 6px 14px; background: #bb86fc; border: none; border-radius: 8px; color: #000; font-size: 0.7rem; font-weight: 600; cursor: pointer;">📋 Ver todos</button>
                    </div>
                    ${itemHtml}
                </div>
            `;
        }

        // ========== FUNCIONES DE BOTONES ==========

        function importarDatos() {
            mostrarModalImportar();
        }

        document.getElementById('importFile')?.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    mostrarToast('📥 Datos importados correctamente');
                } catch (err) {
                    mostrarToast('❌ Archivo inválido');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        });

        // ========== FUNCIÓN DE CONTROL DE VENTAS ==========

        function confirmarVenta() {
            const categoria = document.getElementById('categoriaSelect').value;
            let stockPrincipal;
            if (categoria === 'planchas') {
                stockPrincipal = parseInt(document.getElementById('inputStockPlanchaFila').value) || 0;
            } else {
                stockPrincipal = parseInt(document.getElementById('inputStock').value) || 0;
            }
            const vender = parseInt(document.getElementById('inputVender').value) || 0;
            const vendidosActuales = parseInt(document.getElementById('inputVendidos').value) || 0;
            const stockNuevoActual = parseInt(document.getElementById('inputStockNuevo').value) || 0;

            if (vender <= 0) {
                mostrarToast('❌ Ingresa una cantidad válida para vender');
                return;
            }

            if (vender > stockNuevoActual) {
                mostrarToast(`❌ No hay suficiente stock. Disponible: ${stockNuevoActual}`);
                return;
            }

            // Calcular nuevos valores
            const nuevosVendidos = vendidosActuales + vender;
            const nuevoStock = stockNuevoActual - vender;

            // Actualizar campos
            document.getElementById('inputVendidos').value = nuevosVendidos;
            document.getElementById('inputStockNuevo').value = nuevoStock;
            document.getElementById('inputVender').value = '';

            mostrarToast(`✅ Venta registrada: ${vender} unidad(es)`);
        }

        function sincronizarControlVentas() {
            const categoria = document.getElementById('categoriaSelect').value;
            let stockPrincipal;
            if (categoria === 'planchas') {
                stockPrincipal = parseInt(document.getElementById('inputStockPlanchaFila').value) || 0;
            } else {
                stockPrincipal = parseInt(document.getElementById('inputStock').value) || 0;
            }
            // Al cambiar el stock principal, reiniciar el control de ventas
            document.getElementById('inputStockNuevo').value = stockPrincipal;
            document.getElementById('inputVendidos').value = 0;
            document.getElementById('inputVender').value = '';
        }

        function agregarNuevo() {
            const categoria = document.getElementById('categoriaSelect').value;
            if (!categoria) {
                mostrarToast('❌ Selecciona una categoría primero');
                return;
            }
            // Para varillas, tiras y accesorios, requerir color seleccionado
            const categoriasConColor = ['varillas', 'tiras', 'accesorios'];
            if (categoriasConColor.includes(categoria)) {
                const color = document.getElementById('colorSelect').value;
                if (!color) {
                    mostrarToast('❌ Selecciona un color primero');
                    return;
                }
            }
            const form = document.getElementById('formNuevoItem');
            // Si ya está visible, lo ocultamos
            if (form.classList.contains('visible')) {
                form.classList.remove('visible');
                return;
            }
            // Hacer backup de los datos actuales antes de cualquier modificación
            backupDatosGuardados = JSON.parse(JSON.stringify(datosGuardados));
            // Actualizar el display del color en el formulario
            actualizarDisplayColorForm();

            // Limpiar campos y poner medida por defecto 595
            document.getElementById('inputNombre').value = '';
            document.getElementById('inputCodigo').value = '';
            document.getElementById('inputMedida').value = '595';
            document.getElementById('inputStock').value = '';
            document.getElementById('inputCompra').value = '';
            document.getElementById('inputVenta').value = '';
            document.getElementById('inputVentaMetro').value = '';
            document.getElementById('inputApk').value = '';
            // Limpiar campos de planchas
            document.getElementById('inputStockPlanchaFila').value = '';
            document.getElementById('inputAncho').value = '';
            document.getElementById('inputAlto').value = '';
            document.getElementById('inputPie2').value = '0.00';
            document.getElementById('inputCompraPlancha').value = '';
            document.getElementById('inputVentaPlancha').value = '';
            document.getElementById('inputPieCompra').value = '0.00';
            document.getElementById('inputPieVenta').value = '';
            document.getElementById('inputApkPlancha').value = '';
            // Limpiar control de ventas
            document.getElementById('inputStockNuevo').value = 0;
            document.getElementById('inputVendidos').value = 0;
            document.getElementById('inputVender').value = 0;
            form.classList.add('visible');
            // Scroll hacia el formulario
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function cancelarNuevoItem() {
            document.getElementById('formNuevoItem').classList.remove('visible');
            // Restaurar datos al estado antes de abrir el formulario
            if (backupDatosGuardados) {
                datosGuardados = JSON.parse(JSON.stringify(backupDatosGuardados));
                guardarEnLocalStorage();
                backupDatosGuardados = null;
                // Recargar la vista del color actual
                const categoria = document.getElementById('categoriaSelect').value;
                const color = document.getElementById('colorSelect').value;
                if (categoria && color) {
                    mostrarInfoCategoria(categoria, color);
                }
            }
            mostrarToast('✖ Cancelado');
        }

        function editarItemGuardadoIndex(index) {
            const categoria = document.getElementById('categoriaSelect').value;
            const color = document.getElementById('colorSelect').value;
            if (!categoria || !color) {
                mostrarToast('❌ Selecciona categoría y color');
                return;
            }
            const key = obtenerKey(categoria, color);
            const items = datosGuardados[key] || [];
            if (index < 0 || index >= items.length) {
                mostrarToast('❌ Item no encontrado');
                return;
            }
            // Hacer backup de los datos actuales antes de editar
            backupDatosGuardados = JSON.parse(JSON.stringify(datosGuardados));
            const item = items[index];
            ultimoItemGuardado = item;
            editandoIndex = index; // Guardar el índice para reemplazar al guardar
            cargarItemEnFormulario(item);
        }

        function borrarItemGuardado(index) {
            const categoria = document.getElementById('categoriaSelect').value;
            const color = document.getElementById('colorSelect').value;
            if (!categoria || !color) {
                mostrarToast('❌ Selecciona categoría y color');
                return;
            }
            const key = obtenerKey(categoria, color);
            const items = datosGuardados[key] || [];
            if (index < 0 || index >= items.length) {
                mostrarToast('❌ Item no encontrado');
                return;
            }
            const item = items[index];
            if (!confirm(`¿Borrar "${item.nombre}" de TODOS los colores?`)) return;

            // Obtener todos los colores de la categoría
            const todosLosColores = coloresPorCategoria[categoria] || [];
            const coloresDeCategoria = todosLosColores.map(c => c.value);

            // Borrar de TODOS los colores
            coloresDeCategoria.forEach(colorKey => {
                const k = obtenerKey(categoria, colorKey);
                const itemsColor = datosGuardados[k] || [];
                const idx = itemsColor.findIndex(i => i.nombre === item.nombre && i.codigo === item.codigo);
                if (idx >= 0) {
                    itemsColor.splice(idx, 1);
                    if (itemsColor.length === 0) {
                        delete datosGuardados[k];
                    }
                }
            });

            guardarEnLocalStorage();
            mostrarToast(`🗑️ "${item.nombre}" borrado de todos los colores`);
            mostrarInfoCategoria(categoria, color);
        }

        function editarItemGuardado() {
            if (!ultimoItemGuardado) {
                mostrarToast('❌ No hay item para editar');
                return;
            }
            const item = ultimoItemGuardado;
            cargarItemEnFormulario(item);
        }

        function cargarItemEnFormulario(item) {
            document.getElementById('inputNombre').value = item.nombre;
            document.getElementById('inputCodigo').value = item.codigo === '—' ? '' : item.codigo;
            document.getElementById('inputMedida').value = item.medida === '—' ? '595' : item.medida;

            const categoria = document.getElementById('categoriaSelect').value;

            if (categoria === 'planchas' || item.categoria === 'planchas') {
                // Cargar campos de planchas
                document.getElementById('inputStockPlanchaFila').value = item.stock || '';
                document.getElementById('inputAncho').value = item.ancho > 0 ? item.ancho.toFixed(2) : '';
                document.getElementById('inputAlto').value = item.alto > 0 ? item.alto.toFixed(2) : '';
                document.getElementById('inputPie2').value = item.pie2 > 0 ? item.pie2.toFixed(2) : '0.00';
                document.getElementById('inputCompraPlancha').value = item.compra > 0 ? item.compra.toFixed(2) : '';
                document.getElementById('inputVentaPlancha').value = item.venta > 0 ? item.venta.toFixed(2) : '';
                document.getElementById('inputPieCompra').value = item.pieCompra > 0 ? item.pieCompra.toFixed(2) : '0.00';
                document.getElementById('inputPieVenta').value = item.pieVenta > 0 ? item.pieVenta.toFixed(2) : '0.00';
                document.getElementById('inputApkPlancha').value = item.apk > 0 ? item.apk.toFixed(2) : '';
            } else {
                // Cargar campos normales
                document.getElementById('inputStock').value = item.stock || '';
                document.getElementById('inputCompra').value = item.compra > 0 ? item.compra.toFixed(2) : '';
                document.getElementById('inputVenta').value = item.venta > 0 ? item.venta.toFixed(2) : '';
                document.getElementById('inputVentaMetro').value = item.ventaMetro > 0 ? item.ventaMetro.toFixed(2) : '';
                document.getElementById('inputApk').value = item.apk > 0 ? item.apk.toFixed(2) : '';
            }


            // Cargar datos de control de ventas si existen
            const vendidosGuardados = item.vendidos || 0;
            const stockPrincipal = item.stock || 0;
            document.getElementById('inputVendidos').value = vendidosGuardados;
            document.getElementById('inputVender').value = 0;
            document.getElementById('inputStockNuevo').value = Math.max(0, stockPrincipal - vendidosGuardados);

            // Seleccionar el color si existe
            if (item.color) {
                document.getElementById('colorSelect').value = item.color;
                // Sincronizar círculos
                document.querySelectorAll('.color-item').forEach(el => el.classList.remove('seleccionado'));
                const circulo = document.querySelector(`.color-item[data-value="${item.color}"]`);
                if (circulo) circulo.classList.add('seleccionado');
            }

            // Actualizar el display del color en el formulario
            actualizarDisplayColorForm();

            const form = document.getElementById('formNuevoItem');
            form.classList.add('visible');
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });
            mostrarToast('✏️ Editando item');
        }

        function guardarNuevoItem() {
            const nombre = document.getElementById('inputNombre').value.trim();
            const codigo = document.getElementById('inputCodigo').value.trim();
            const medida = document.getElementById('inputMedida').value.trim();
            const categoria = document.getElementById('categoriaSelect').value;
            const colorPrincipal = document.getElementById('colorSelect').value;
            const colorTexto = colorPrincipal ? document.getElementById('colorSelect').options[document.getElementById('colorSelect').selectedIndex].text : '';
            const vendidos = parseInt(document.getElementById('inputVendidos').value) || 0;

            if (!nombre && !codigo) {
                mostrarToast('❌ Debes ingresar al menos un nombre o un código');
                document.getElementById('inputNombre').focus();
                return;
            }

            // Leer campos según categoría
            let itemCompleto;
            if (categoria === 'planchas') {
                const stock = document.getElementById('inputStockPlanchaFila').value;
                const compra = document.getElementById('inputCompraPlancha').value;
                const venta = document.getElementById('inputVentaPlancha').value;
                const ancho = document.getElementById('inputAncho').value;
                const alto = document.getElementById('inputAlto').value;
                const pie2 = document.getElementById('inputPie2').value;
                const pieCompra = document.getElementById('inputPieCompra').value;
                const pieVenta = document.getElementById('inputPieVenta').value;
                const apk = document.getElementById('inputApkPlancha').value;

                itemCompleto = {
                    nombre: nombre,
                    codigo: codigo || '—',
                    medida: '—',
                    stock: stock ? parseInt(stock) : 0,
                    compra: compra ? parseFloat(compra) : 0,
                    venta: venta ? parseFloat(venta) : 0,
                    ventaMetro: 0,
                    apk: apk ? parseFloat(apk) : 0,
                    ancho: ancho ? parseFloat(ancho) : 0,
                    alto: alto ? parseFloat(alto) : 0,
                    pie2: pie2 ? parseFloat(pie2) : 0,
                    pieCompra: pieCompra ? parseFloat(pieCompra) : 0,
                    pieVenta: pieVenta ? parseFloat(pieVenta) : 0,
                    vendidos: vendidos,
                    categoria: categoria,
                    colorTexto: colorTexto
                };
            } else {
                const compra = document.getElementById('inputCompra').value;
                const venta = document.getElementById('inputVenta').value;
                const ventaMetro = document.getElementById('inputVentaMetro').value;
                const apk = document.getElementById('inputApk').value;
                const stock = document.getElementById('inputStock').value;

                itemCompleto = {
                    nombre: nombre,
                    codigo: codigo || '—',
                    medida: medida || '—',
                    stock: stock ? parseInt(stock) : 0,
                    compra: compra ? parseFloat(compra) : 0,
                    venta: venta ? parseFloat(venta) : 0,
                    ventaMetro: ventaMetro ? parseFloat(ventaMetro) : 0,
                    apk: apk ? parseFloat(apk) : 0,
                    vendidos: vendidos,
                    categoria: categoria,
                    colorTexto: colorTexto
                };
            }

            // Datos base (solo nombre y código, para colores no seleccionados)
            const itemBase = {
                nombre: nombre,
                codigo: codigo || '—',
                medida: '—',
                stock: 0,
                compra: 0,
                venta: 0,
                ventaMetro: 0,
                apk: 0,
                vendidos: 0,
                categoria: categoria,
                colorTexto: colorTexto
            };

            // Colores donde se guardarán datos completos (los seleccionados con círculos)
            const coloresCompletos = [colorPrincipal];
            coloresAdicionales.forEach(c => {
                if (!coloresCompletos.includes(c)) coloresCompletos.push(c);
            });

            // Obtener todos los colores de la categoría
            const todosLosColores = coloresPorCategoria[categoria] || [];
            const coloresDeCategoria = todosLosColores.map(c => c.value);

            // Guardar en TODOS los colores de la categoría
            coloresDeCategoria.forEach(color => {
                const key = obtenerKey(categoria, color);
                if (!datosGuardados[key]) {
                    datosGuardados[key] = [];
                }

                // Determinar si este color tiene datos completos o solo nombre/código
                const esCompleto = coloresCompletos.includes(color);
                const item = esCompleto ? { ...itemCompleto, color: color } : { ...itemBase, color: color };

                // Buscar si el item ya existe en este color por nombre+código
                const idxEnColor = datosGuardados[key].findIndex(i => i.nombre === itemCompleto.nombre && i.codigo === itemCompleto.codigo);
                if (idxEnColor >= 0) {
                    // Ya existe: actualizar según corresponda
                    if (esCompleto) {
                        datosGuardados[key][idxEnColor] = item;
                    } else {
                        datosGuardados[key][idxEnColor].nombre = item.nombre;
                        datosGuardados[key][idxEnColor].codigo = item.codigo;
                    }
                } else {
                    // No existe: crear nuevo
                    datosGuardados[key].push(item);
                }
            });
            guardarEnLocalStorage();

            // Guardar el último item para poder editarlo
            ultimoItemGuardado = itemCompleto;

            console.log('Item guardado en todos los colores:', coloresDeCategoria, 'Completos:', coloresCompletos);
            mostrarToast(`✅ "${nombre}" guardado en ${coloresDeCategoria.length} color(es)`);

            editandoIndex = -1; // Resetear modo edición

            // Descartar backup porque el guardado fue exitoso
            backupDatosGuardados = null;

            // Ocultar formulario
            document.getElementById('formNuevoItem').classList.remove('visible');

            // Mostrar los datos actualizados del color seleccionado
            mostrarInfoCategoria(categoria, colorPrincipal);
        }
    </script>
